query CartInput($collectionIds: [ID!], $eligibilityTags: [String!]) {
  cart {
    cost {
      subtotalAmount {
        amount
        currencyCode
      }
    }
    lines {
      id
      quantity
      merchandise {
        ... on ProductVariant {
          product {
            id
            inAnyCollection(ids: $collectionIds)
          }
        }
      }
    }
    buyerIdentity {
      customer {
        id
        hasAnyTag(tags: $eligibilityTags)
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "combined_discount", key: "config") {
      value
    }
  }
}
