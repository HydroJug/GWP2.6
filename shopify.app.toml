# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "cb141d9f9e2354841d444043a139da8f"
name = "GWP-2.5"
handle = "gwp-2-5"
application_url = "https://gwp-2-5.vercel.app/"
embedded = true

[build]
automatically_update_urls_on_dev = false
include_config_on_deploy = true

[webhooks]
api_version = "2025-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_products,write_cart_transforms"

[auth]
redirect_urls = [
  "https://gwp-2-5.vercel.app/auth/callback",
  "https://gwp-2-5.vercel.app/auth/shopify/callback",
  "https://gwp-2-5.vercel.app/api/auth/callback"
]

[pos]
embedded = true
