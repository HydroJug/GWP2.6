query RunInput($collectionIds: [ID!]) {
  cart {
    lines {
      id
      quantity
      merchandise {
        ... on ProductVariant {
          product {
            id
            inAnyCollection(ids: $collectionIds)
          }
        }
      }
    }
    cost {
      subtotalAmount {
        amount
        currencyCode
      }
    }
    attribute(key: "channel") {
      value
    }
  }
  discount {
    metafield(namespace: "pos_only", key: "config") {
      value
    }
  }
}
