client_id = "cb141d9f9e2354841d444043a139da8f"
name = "GWP-2.5"
handle = "gwp-2-5"
application_url = "https://sub-canada-cp-unavailable.trycloudflare.com"
embedded = true

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products"

[auth]
redirect_urls = [
  "https://sub-canada-cp-unavailable.trycloudflare.com/auth/callback",
  "https://sub-canada-cp-unavailable.trycloudflare.com/auth/shopify/callback",
  "https://sub-canada-cp-unavailable.trycloudflare.com/api/auth/callback"
]

[pos]
embedded = false
