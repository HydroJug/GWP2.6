query DeliveryInput {
  cart {
    deliveryGroups {
      id
    }
    attribute(key: "channel") {
      value
    }
    cost {
      subtotalAmount {
        amount
      }
    }
    buyerIdentity {
      customer {
        id
        email
        firstName
        lastName
        amountSpent {
          amount
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "tapcart", key: "discount_config") {
      value
    }
  }
}
